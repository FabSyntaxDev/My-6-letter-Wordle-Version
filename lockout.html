<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volte Amanhã</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .lockout-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .timer-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .countdown {
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent-color);
            margin: 20px 0;
            font-family: 'Inter', sans-serif;
            letter-spacing: 4px;
        }

        .lockout-msg {
            font-size: 1.5rem;
            opacity: 0.8;
            max-width: 500px;
            line-height: 1.6;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }
    </style>
</head>

<body>
    <div class="lockout-container">
        <div class="timer-box">
            <h1>Próximo Desafio em:</h1>
            <div id="countdown" class="countdown">00:00:00</div>
            <p class="lockout-msg">Você já completou o desafio de hoje. Descanse um pouco e volte amanhã para uma nova
                palavra!</p>
        </div>
    </div>
    <script>
        function updateCountdown() {
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setHours(24, 0, 0, 0);

            const diff = tomorrow - now;

            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('countdown').textContent =
                `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            if (diff <= 0) {
                window.location.href = 'index.html';
            }
        }

        // Check if they should even be here
        const saved = JSON.parse(localStorage.getItem('nano-banana-state'));
        const today = new Date();
        const dateKey = `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;

        if (!saved || saved.date !== dateKey || !saved.gameOver) {
            window.location.href = 'index.html';
        } else {
            const msgElement = document.querySelector('.lockout-msg');
            const titleElement = document.querySelector('h1');
            if (saved.won) {
                titleElement.textContent = "Parabéns pelo Desafio!";
                msgElement.textContent = "Você venceu o desafio de hoje! Mostre para seus amigos e volte amanhã para uma nova palavra.";
            } else {
                titleElement.textContent = "Não foi dessa vez!";
                msgElement.textContent = "Infelizmente você não conseguiu completar o desafio do dia. Estude mais e tente novamente amanhã!";
            }
            setInterval(updateCountdown, 1000);
            updateCountdown();
        }
    </script>
</body>

</html>
